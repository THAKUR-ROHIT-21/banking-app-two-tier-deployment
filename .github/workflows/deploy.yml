name: Deploy SimpleBank

on:
  workflow_call:

permissions:
  id-token: write
  contents: read

env:
  VERSION: v2
  IMAGE: 306158389325.dkr.ecr.ap-south-1.amazonaws.com/flask_app_for_two_teir_application_simple_bank
  REGION: ap-south-1
  S3_BUCKET: s3://306158389325-devops-scripts

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: THAKUR-ROHIT-21/banking-app-two-tier-deployment
          ref: main

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::306158389325:role/GitHub-action-deploy-role-policy
          aws-region: ${{ env.REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ env.REGION }} | \
          docker login --username AWS --password-stdin \
          306158389325.dkr.ecr.${{ env.REGION }}.amazonaws.com
          echo "Login Successfull to ECR ✅"

      - name: Build and Push image
        run: |
          docker build -t ${{ env.IMAGE }}:${{ env.VERSION }} .
          docker push ${{ env.IMAGE }}:${{ env.VERSION }}
          echo "Image Pushed : ${{ env.VERSION }} ✅"

      - name: Upload Docker-Compose to S3
        run: |
          aws s3 cp docker-compose.yml ${{ env.S3_BUCKET }}/docker-compose.yml --region ${{ env.REGION }}
          echo "Docker compose Uploaded ✅"

      - name: Deploy via SSM
        id: deploy
        run: |
          CMD_ID=$(aws ssm send-command \
            --targets "Key=tag:App,Values=flask" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy ${{ env.VERSION }} by ${{ github.actor }}" \
            --parameters '{"commands":[
              "set -e",
              "aws ecr get-login-password --region ${{ env.REGION }} | docker login --username AWS --password-stdin 306158389325.dkr.ecr.${{ env.REGION }}.amazonaws.com",
              "mkdir -p /home/ubuntu/app",
              "aws s3 cp ${{ env.S3_BUCKET }}/docker-compose.yml /home/ubuntu/app/docker-compose.yml --region ${{ env.REGION }}",
              "docker pull ${{ env.IMAGE }}:${{ env.VERSION }}",
              "docker stop simplebank 2>/dev/null || true",
              "docker rm simplebank 2>/dev/null || true",
              "cd /home/ubuntu/app && IMAGE_TAG=${{ env.VERSION }} docker compose up -d",
              "docker ps --filter name=simplebank --format \"{{.Status}}\" | grep -q Up || (echo CONTAINER_FAILED && exit 1)",
              "echo CONTAINER_RUNNING ✅"
            ]}' \
            --query 'Command.CommandId' \
            --output text \
            --region ${{ env.REGION }})

          echo "cmd_id=$CMD_ID" >> $GITHUB_OUTPUT

      - name: Verify Deployment
        run: |
          for i in {1..10}; do
            STATUS=$(aws ssm list-command-invocations \
              --command-id "${{ steps.deploy.outputs.cmd_id }}" \
              --query "CommandInvocations[*].Status" \
              --output text \
              --region ${{ env.REGION }})

            echo "[$i] Status: $STATUS"

            echo "$STATUS" | grep -q "InProgress\|Pending" && sleep 10 || break
          done

          echo "============ DEPLOY RESULTS ============"

          aws ssm list-command-invocations \
            --command-id "${{ steps.deploy.outputs.cmd_id }}" \
            --details \
            --region ${{ env.REGION }} \
            --query "CommandInvocations[*].[InstanceId,Status,CommandPlugins[0].Output]" \
            --output text

          echo "✅ Deploy successful — ${{ env.VERSION }}"