name: Smoke Testing For Infra and Networking

on:
  workflow_call:

permissions:
  id-token: write
  contents: read

jobs:
  init-db:
    uses: ./.github/workflows/init-db.yml

  smoke:
    needs: init-db
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          repository: THAKUR-ROHIT-21/banking-app-two-tier-deployment
          ref: main

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::306158389325:role/GitHub-action-deploy-role-policy
          aws-region: ap-south-1

      - name: Upload smoke_test.py to S3
        run: |
          aws s3 mb s3://306158389325-devops-scripts --region ap-south-1 2>/dev/null || true
          aws s3 cp smoke_test.py s3://306158389325-devops-scripts/smoke_test.py --region ap-south-1

      - name: Run Smoke Test on Fleet
        id: smoke
        run: |
          CMD_ID=$(aws ssm send-command \
            --targets "Key=tag:App,Values=flask" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":[
              "rm -f /home/ubuntu/smoke_test.py",
              "aws s3 cp s3://306158389325-devops-scripts/smoke_test.py /home/ubuntu/smoke_test.py --region ap-south-1",
              "python3 -m pip install pymysql boto3 -q",
              "python3 /home/ubuntu/smoke_test.py",
              "rm -f /home/ubuntu/smoke_test.py"
            ]}' \
            --query 'Command.CommandId' \
            --output text \
            --region ap-south-1)

          echo "cmd_id=$CMD_ID" >> $GITHUB_OUTPUT

      - name: Show Results
        run: |
          sleep 30

          aws ssm list-command-invocations \
            --command-id "${{ steps.smoke.outputs.cmd_id }}" \
            --details \
            --region ap-south-1 \
            --output text

          FAILED=$(aws ssm list-command-invocations \
            --command-id "${{ steps.smoke.outputs.cmd_id }}" \
            --query "length(CommandInvocations[?Status=='Failed'])" \
            --output text \
            --region ap-south-1)

          if [ "$FAILED" -gt 0 ]; then
            echo "::error::Smoke test failed on $FAILED instance(s)!"
            exit 1
          fi

          echo "✅ Smoke Test Passed!"