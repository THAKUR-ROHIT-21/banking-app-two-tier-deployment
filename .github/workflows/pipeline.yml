name: Main Workflow

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  verify_connection:
    uses: ./.github/workflows/test_connection.yml

  smoke_test:
    needs: verify_connection
    uses: ./.github/workflows/smoke_test.yml

  deploy_test:
    needs: verify_connection
    uses: ./.github/workflows/deploy.yml